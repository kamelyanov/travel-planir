<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Planner</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <h1>
            ✈️ Travel Planner
            <small><i class="fas fa-map-signs"></i> планировщик маршрутов</small>
        </h1>
        <div class="sub">
            <i class="fas fa-clock"></i> Планируйте маршрут, добавляя точки пребывания и переходы между ними.
            Время прибытия = время отправления из предыдущей точки + длительность перехода.
        </div>

        <div class="timeline" id="timelineContainer">
            <div class="timeline-track" id="timelineTrack">
                <!-- динамическая отрисовка карточек -->
            </div>
        </div>

        <div class="global-add">
            <button class="btn-primary" id="addPointBtn"><i class="fas fa-plus-circle"></i> Добавить точку</button>
        </div>

        <div class="summary" id="summaryPanel">
            <span><i class="fas fa-route"></i> Общая длительность: — </span>
            <span><i class="fas fa-location-dot"></i> Всего точек: 0</span>
        </div>

        <!-- Пустая карточка для ввода новой точки -->
        <div class="new-point-card-wrapper" id="newPointCardWrapper" style="display: none;">
            <div class="checkpoint-card new-point-card">
                <div class="checkpoint-time-sidebar">
                    <div class="time-badge arrival">
                        <span class="time-value">--:--</span>
                        <span class="time-label">Прибытие</span>
                    </div>
                    <div class="time-badge duration">
                        <span class="duration-value">—</span>
                    </div>
                    <div class="time-badge departure">
                        <span class="time-value">--:--</span>
                        <span class="time-label">Отправление</span>
                    </div>
                </div>
                <div class="card-header">
                    <div class="card-actions-left">
                        <button class="pin-btn" id="newPointPinBtn" title="Закрепить">
                            <i class="fas fa-thumbtack"></i>
                        </button>
                        <button class="edit-btn" id="newPointEditBtn" title="Редактировать">
                            <i class="fas fa-edit"></i>
                        </button>
                    </div>
                    <div class="card-actions-right">
                        <button class="delete-btn" id="newPointCancelBtn" title="Отменить">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
                <div class="new-point-form">
                    <div class="form-row-3">
                        <div class="form-group">
                            <input type="text" id="newPointName" placeholder="Название точки">
                            <small class="form-hint">Название места или адрес</small>
                        </div>
                        <div class="form-group">
                            <input type="text" id="newPointTravelDuration" placeholder="1ч 30м">
                            <small class="form-hint">Время в пути</small>
                        </div>
                    </div>
                    <div class="form-row-2">
                        <div class="form-group">
                            <label>Прибытие</label>
                            <div class="datetime-inputs">
                                <input type="date" id="newPointArrivalDate">
                                <input type="time" id="newPointArrival">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Отправление</label>
                            <div class="datetime-inputs">
                                <input type="date" id="newPointDepartureDate">
                                <input type="time" id="newPointDeparture">
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Пребывание</label>
                        <input type="text" id="newPointStayDuration" placeholder="—" readonly class="readonly-field">
                    </div>
                    <div class="form-group">
                        <textarea id="newPointNotes" rows="2" placeholder="Заметки (необязательно)"></textarea>
                    </div>
                    <div class="form-actions">
                        <button class="btn-primary" id="newPointSaveBtn"><i class="fas fa-check"></i> Сохранить точку</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="src/main.js"></script>
</body>
</html>
